<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Hyperwisper overlay — Pasted">
  <title>Hyperwisper overlay — Pasted</title>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100E0C"/>
      <stop offset="100%" stop-color="#1A1613"/>
    </linearGradient>
    <linearGradient id="pillsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFF0DC" stop-opacity="0.06"/>
      <stop offset="45%" stop-color="#FFF0DC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="300" rx="20" fill="url(#desk)"/>
  <text x="450" y="42" font-family="'Cascadia Code', 'SF Mono', Consolas, 'Liberation Mono', monospace" font-size="14" fill="#988F86" text-anchor="middle" letter-spacing="1.6">PASTED</text>

  <rect x="110" y="88" width="680" height="116" rx="34" fill="#000" opacity="0.42"/>
  <rect x="110" y="78" width="680" height="116" rx="34" fill="#1C1815" fill-opacity="0.96"/>
  <rect x="110" y="78" width="680" height="116" rx="34" fill="url(#pillsheen)"/>
  <rect x="110.5" y="78.5" width="679" height="115" rx="33.5" fill="none" stroke="#FFF5E6" stroke-opacity="0.09"/>

  <circle cx="156" cy="136" r="17" fill="#9CC072" opacity="0.16"/>
  <path d="M 148 136 l 6 6 l 12 -13" fill="none" stroke="#9CC072" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="194" y="145" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Inter, system-ui, sans-serif" font-size="25" fill="#F4F0EC">Collé</text>
  <text x="450" y="276" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Inter, system-ui, sans-serif" font-size="15" fill="#988F86" text-anchor="middle">Floats above every window · drag to reposition · Esc to cancel</text>
</svg>
