<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Hyperwisper overlay — Transcribing">
  <title>Hyperwisper overlay — Transcribing</title>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100E0C"/>
      <stop offset="100%" stop-color="#1A1613"/>
    </linearGradient>
    <linearGradient id="pillsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFF0DC" stop-opacity="0.06"/>
      <stop offset="45%" stop-color="#FFF0DC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="300" rx="20" fill="url(#desk)"/>
  <text x="450" y="42" font-family="'Cascadia Code', 'SF Mono', Consolas, 'Liberation Mono', monospace" font-size="14" fill="#988F86" text-anchor="middle" letter-spacing="1.6">TRANSCRIBING</text>

  <rect x="110" y="88" width="680" height="116" rx="34" fill="#000" opacity="0.42"/>
  <rect x="110" y="78" width="680" height="116" rx="34" fill="#1C1815" fill-opacity="0.96"/>
  <rect x="110" y="78" width="680" height="116" rx="34" fill="url(#pillsheen)"/>
  <rect x="110.5" y="78.5" width="679" height="115" rx="33.5" fill="none" stroke="#FFF5E6" stroke-opacity="0.09"/>

  <g transform="translate(156 136)">
    <circle r="15" fill="none" stroke="#312B26" stroke-width="3"/>
    <path d="M 0 -15 A 15 15 0 0 1 13 7.5" fill="none" stroke="#D6995C" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="194" y="145" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Inter, system-ui, sans-serif" font-size="25" fill="#F4F0EC">Transcription</text>
  <g fill="#988F86">
    <circle cx="372" cy="136" r="3.5" opacity="0.9"/>
    <circle cx="388" cy="136" r="3.5" opacity="0.55"/>
    <circle cx="404" cy="136" r="3.5" opacity="0.3"/>
  </g>
  <text x="450" y="276" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Inter, system-ui, sans-serif" font-size="15" fill="#988F86" text-anchor="middle">Floats above every window · drag to reposition · Esc to cancel</text>
</svg>
