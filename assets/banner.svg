<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Hyperwisper — local voice-to-text dictation for Windows">
  <title>Hyperwisper</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#D6995C" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#D6995C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#D6995C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#312B26" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#312B26" stop-opacity="1"/>
      <stop offset="100%" stop-color="#312B26" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFF5E6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFF5E6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="#141210"/>
  <ellipse cx="250" cy="150" rx="620" ry="420" fill="url(#glow)"/>
  <rect width="1200" height="420" fill="url(#sheen)"/>

  <!-- brandmark -->
