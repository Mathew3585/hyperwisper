  <!-- tagline -->
  <text x="90" y="205" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Inter, system-ui, sans-serif" font-size="25" font-weight="400" letter-spacing="-0.4" fill="#C9BFB4">Press a key. Speak. Your words appear — anywhere in Windows.</text>
