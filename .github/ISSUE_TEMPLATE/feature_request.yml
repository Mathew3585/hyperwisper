name: Feature request
description: Suggest an idea for Hyperwisper
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](https://github.com/Mathew3585/hyperwisper#roadmap) first —
        your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the friction you hit, not just the feature you want.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true

  - type: checkboxes
    id: principles
    attributes:
      label: Does this fit the project's principles?
      description: Hyperwisper is local-only, free, and deliberately restrained in its UI.
      options:
        - label: This works without any network request or cloud service
        - label: I'd be interested in helping implement it
